<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck DMS - Document Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .transition-all {
            transition: all 0.3s ease;
        }
        .file-drop-area {
            border: 2px dashed #cbd5e0;
            transition: border-color 0.3s ease;
        }
        .file-drop-area.dark {
            border-color: #4b5563;
        }
        .file-drop-area.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .file-drop-area.dark.dragover {
            background-color: #1e3a8a;
        }
        .tag-chip {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .filter-tag {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            background: white;
            border: 2px solid #e5e7eb;
            color: #374151;
            cursor: pointer;
            transition: all 0.2s;
        }
        .document-card {
            background: white;
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
        }
        .document-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #3b82f6;
        }
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 50;
            overflow-y: auto;
        }
        .modal-content {
            position: relative;
            top: 5rem;
            margin: 0 auto;
            padding: 1.5rem;
            border: 1px solid #e5e7eb;
            background: white;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }
        .summary-item {
            padding: 0.75rem;
            background: #f9fafb;
            border-radius: 0.5rem;
            border: 1px solid #e5e7eb;
        }
        .summary-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #6b7280;
            margin-bottom: 0.25rem;
        }
        .summary-value {
            font-size: 0.875rem;
            font-weight: 500;
            color: #111827;
            word-break: break-word;
        }
        /* Dark mode overrides for custom styles */
        .dark .filter-tag { background: #1f2937; border-color: #374151; color: #d1d5db; }
        .dark .filter-tag.active { background: #3b82f6; border-color: #3b82f6; color: white; }
        .dark .document-card { background: #1f2937; border-color: #374151; }
        .dark .modal-content { background: #1f2937; border-color: #374151; color: white; }
        .dark .summary-item { background: #374151; border-color: #4b5563; }
        .dark .summary-label { color: #9ca3af; }
        .dark .summary-value { color: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-200">
    <!-- Navigation -->
    <nav class="bg-white dark:bg-gray-800 shadow-lg border-b border-gray-200 dark:border-gray-700 transition-colors duration-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fas fa-truck text-blue-600 dark:text-blue-400 text-2xl mr-3"></i>
                    <h1 class="text-xl font-semibold text-gray-800 dark:text-white">Truck DMS</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <!-- Export Dropdown -->
                    <div class="relative" id="export-dropdown">
                        <button onclick="toggleExportDropdown()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center space-x-2 transition-all">
                            <i class="fas fa-download"></i>
                            <span>Export</span>
                            <i class="fas fa-chevron-down text-xs"></i>
                        </button>
                        <div id="export-menu" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 z-50">
                            <div class="py-1">
                                <button onclick="exportFilteredDocuments('pdf')" class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center space-x-2">
                                    <i class="fas fa-file-pdf text-red-600 dark:text-red-500"></i>
                                    <span>Export as PDF</span>
                                </button>
                                <button onclick="exportFilteredDocuments('excel')" class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center space-x-2">
                                    <i class="fas fa-file-excel text-green-600 dark:text-green-500"></i>
                                    <span>Export as Excel</span>
                                </button>
                                <button onclick="exportFilteredDocuments('csv')" class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center space-x-2">
                                    <i class="fas fa-file-csv text-blue-600 dark:text-blue-400"></i>
                                    <span>Export as CSV</span>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Filter Dropdown -->
                    <div class="relative" id="filter-dropdown">
                        <button onclick="toggleFilterDropdown()" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg flex items-center space-x-2 transition-all">
                            <i class="fas fa-filter"></i>
                            <span>Filter</span>
                            <i class="fas fa-chevron-down text-xs"></i>
                        </button>
                        <div id="filter-menu" class="hidden absolute right-0 mt-2 w-56 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 z-50">
                            <div class="py-1">
                                <div class="px-4 py-2 border-b border-gray-200 dark:border-gray-700">
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Document Type</label>
                                    <select id="nav-document-type-filter" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 dark:text-white dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent text-sm">
                                        <option value="">All Types</option>
                                    </select>
                                </div>
                                <div class="px-4 py-2 border-b border-gray-200 dark:border-gray-700">
                                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">File Type</label>
                                    <select id="nav-file-type-filter" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 dark:text-white dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent text-sm">
                                        <option value="">All File Types</option>
                                    </select>
                                </div>
                                <div class="px-4 py-2">
                                    <button onclick="applyNavFilters()" class="w-full bg-purple-600 hover:bg-purple-700 text-white px-3 py-2 rounded-lg text-sm transition-all">
                                        Apply Filters
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <span class="text-sm text-gray-600" id="document-count">0 documents</span>
                    <div class="text-lg font-bold text-green-600" id="total-display">$0.00</div>
                    <button onclick="openUploadModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center space-x-2 transition-all">
                        <i class="fas fa-upload"></i>
                        <span>Upload Document</span>
                    </button>
                    
                    <!-- Theme Toggle -->
                    <button id="theme-toggle" class="p-2 text-gray-500 rounded-lg focus:outline-none dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <i id="theme-toggle-dark-icon" class="hidden fas fa-moon text-lg"></i>
                        <i id="theme-toggle-light-icon" class="hidden fas fa-sun text-lg"></i>
                    </button>
                    
                    <!-- User Menu -->
                    <div class="border-l border-gray-200 dark:border-gray-700 pl-4 ml-1 flex items-center space-x-4">
                        <div class="flex flex-col text-right">
                            <span class="text-sm font-semibold text-gray-900 dark:text-gray-100" id="current-username">User</span>
                            <span class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wider" id="current-role">Role</span>
                        </div>
                        <div class="relative relative-user-menu">
                            <button id="user-menu-btn" onclick="toggleUserMenu()" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200 focus:outline-none">
                                <i class="fas fa-user"></i>
                            </button>
                            <div id="user-menu-dropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-100 dark:border-gray-700 py-1 hidden z-50">
                                <a href="/admin" id="admin-link" class="hidden px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 flex items-center">
                                    <i class="fas fa-cog w-5 text-gray-400"></i> Admin Dashboard
                                </a>
                                <div class="border-t border-gray-100 dark:border-gray-700 my-1 hidden" id="admin-divider"></div>
                                <a href="/logout" class="block px-4 py-2 text-sm text-red-600 dark:text-red-500 hover:bg-red-50 dark:hover:bg-gray-700 flex items-center">
                                    <i class="fas fa-sign-out-alt w-5"></i> Sign Out
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Search and Filter Section -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Search Documents</label>
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="Search by title, description..." 
                               class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Document Type</label>
                    <select id="document-type-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="">All Types</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">File Type</label>
                    <select id="type-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="">All File Types</option>
                    </select>
                </div>
            </div>
            
            <!-- Document Type Filter Tags -->
            <div class="flex flex-wrap gap-2 mt-4" id="filter-tags"></div>
        </div>

        <!-- Documents Grid -->
        <div id="documents-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Documents will be loaded here dynamically -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-12">
            <i class="fas fa-folder-open text-gray-400 text-6xl mb-4"></i>
            <h3 class="text-lg font-medium text-gray-900 mb-2">No documents yet</h3>
            <p class="text-gray-500 mb-4">Get started by uploading your first trucking document</p>
            <button onclick="openUploadModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg inline-flex items-center space-x-2 transition-all">
                <i class="fas fa-upload"></i>
                <span>Upload Document</span>
            </button>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" class="modal hidden">
        <div class="modal-content w-full max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-gray-900">Upload Trucking Document</h3>
                <button onclick="closeUploadModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <form id="upload-form" enctype="multipart/form-data">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Title *</label>
                        <input type="text" id="title" name="title" placeholder="e.g., Load 101 - RC" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Amount ($) *</label>
                        <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Document Type *</label>
                        <select id="document-type" name="document_type" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">Select document type</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                        <textarea id="description" name="description" rows="1" placeholder="Add notes..."
                                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                    </div>
                </div>
                
                <div id="document-fields-container" class="mb-4"></div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Document File</label>
                    <div id="file-drop-area" class="file-drop-area p-8 text-center cursor-pointer rounded-lg bg-gray-50 hover:bg-gray-100 transition-all">
                        <input type="file" id="file-input" name="file" class="hidden" onchange="handleFileSelect(this)">
                        <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-3"></i>
                        <p class="text-gray-600 mb-2">Drag and drop your file here or click to browse</p>
                        <p class="text-sm text-gray-500">Supported files: PDF, Images, Documents, Spreadsheets</p>
                        <p class="text-sm text-gray-500 mt-2" id="selected-file-name"></p>
                    </div>
                </div>
                
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeUploadModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-all">
                        Cancel
                    </button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all disabled:opacity-50" id="upload-btn">
                        Upload Document
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content w-full max-w-md mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-gray-900">Edit Document</h3>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <form id="edit-form">
                <input type="hidden" id="edit-doc-id">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Document Type</label>
                    <select id="edit-document-type" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="">Select Document Type</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Title</label>
                    <input type="text" id="edit-title" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Amount</label>
                    <input type="number" id="edit-amount" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" step="0.01">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea id="edit-description" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                </div>
                
                <!-- Document-specific fields will be inserted here -->
                <div id="edit-document-fields-container"></div>
                
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeEditModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-all">
                        Cancel
                    </button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="modal hidden">
        <div class="flex items-center justify-center h-full">
            <div class="bg-white p-5 rounded-lg shadow-lg flex items-center space-x-3">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                <span class="text-gray-700">Loading...</span>
            </div>
        </div>
    </div>

    <script>
        // Init User
        const user = {{ user|safe if user else 'null' }};
        if (user) {
            document.getElementById('current-username').textContent = user.username;
            document.getElementById('current-role').textContent = user.role;
            if (user.role === 'admin') {
                document.getElementById('admin-link').classList.remove('hidden');
                document.getElementById('admin-divider').classList.remove('hidden');
            }
        }
        
        // User Menu Toggle Logic
        function toggleUserMenu() {
            document.getElementById('user-menu-dropdown').classList.toggle('hidden');
        }

        window.addEventListener('click', function(e) {
            // Close user menu clicking outside
            if (!e.target.closest('.relative-user-menu')) {
                const dropdown = document.getElementById('user-menu-dropdown');
                if (dropdown && !dropdown.classList.contains('hidden')) {
                    dropdown.classList.add('hidden');
                }
            }
        });
        
        // Dark Mode Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');
        
        if (document.documentElement.classList.contains('dark')) {
            lightIcon.classList.remove('hidden');
        } else {
            darkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            darkIcon.classList.toggle('hidden');
            lightIcon.classList.toggle('hidden');

            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
